services:
  postgres:
    image: postgres:16-alpine
    container_name: saaya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: saaya
      POSTGRES_PASSWORD: saaya_secret
      POSTGRES_DB: saaya_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saaya -d saaya_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saaya-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: saaya-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://saaya:saaya_secret@postgres:5432/saaya_ai?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: saaya-worker
    restart: unless-stopped
    command: ["node", "apps/api/dist/workers/index.js"]
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://saaya:saaya_secret@postgres:5432/saaya_ai?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  admin:
    build:
      context: ../..
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: saaya-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
