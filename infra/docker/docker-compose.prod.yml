# Production overlay — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 512M

  worker:
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 512M

  postgres:
    ports: []

  redis:
    ports: []
